<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTR Prospecting Engine - AI-Powered Lead Intelligence</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <script crossorigin src="/static/vendor/react.production.min.js"></script>
    <script crossorigin src="/static/vendor/react-dom.production.min.js"></script>
    <script src="/static/vendor/tailwind.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        orbitron: ['Orbitron', 'sans-serif'],
                        jetbrains: ['JetBrains Mono', 'monospace'],
                        inter: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    },
                    borderRadius: {
                        '2xl': '1rem',
                    },
                    keyframes: {
                        'glow-pulse': {
                            '0%, 100%': { boxShadow: '0 0 12px rgba(16,185,129,0.35)' },
                            '50%':      { boxShadow: '0 0 22px rgba(16,185,129,0.55)' },
                        },
                    },
                    animation: {
                        'glow-pulse': 'glow-pulse 2.5s ease-in-out infinite',
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #14b8a6;
            --primary-bright: #14b8a6;
            --primary-dim: #0d9488;
            --bg-dark: #F7F9FC;
            --bg-card: #FFFFFF;
            --bg-card-hover: #F1F5F9;
            --bg-surface: #F1F5F9;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --border-subtle: #f1f5f9;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-yellow: #f59e0b;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --accent-teal: #14b8a6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 8px rgba(20,184,166,0.2); }
            50% { box-shadow: 0 0 16px rgba(20,184,166,0.3); }
        }

        @keyframes subtleGlow {
            0%, 100% { box-shadow: 0 0 8px rgba(20,184,166,0.12); }
            50% { box-shadow: 0 0 14px rgba(20,184,166,0.2); }
        }

        @keyframes navDropIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes cmdPaletteIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes cmdPaletteOverlayIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes feedSlideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive navigation */
        @media (max-width: 768px) {
            .nav-desktop { display: none !important; }
            .nav-mobile { display: block !important; }
        }
        @media (min-width: 769px) {
            .nav-desktop { display: flex !important; }
            .nav-mobile { display: none !important; }
        }

        #root { position: relative; z-index: 1; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #F7F9FC; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Item 3 — micro hover elevation */
        .prospect-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .prospect-card:hover {
            transform: translateY(-1px) scale(1.005);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
        }
        .prospect-card.card-high-priority:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.05);
        }
        /* Item 13 — high score glow ring */
        .card-score-glow {
            box-shadow: 0 0 12px rgba(20,184,166,0.15);
            animation: subtleGlow 2.5s ease-in-out infinite;
        }

        .action-btn {
            transition: all 0.2s ease;
        }
        .action-btn:hover:not(:disabled) {
            border-color: #14b8a6 !important;
            color: #14b8a6 !important;
            background: rgba(20,184,166,0.06) !important;
        }
        .why-now-text {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .why-now-text.expanded {
            -webkit-line-clamp: unset;
            overflow: visible;
        }
        .filter-pill {
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
        }
        .filter-pill:hover {
            border-color: #14b8a6 !important;
            color: #0d9488 !important;
        }
        .btn-disabled {
            opacity: 0.6;
            cursor: not-allowed !important;
        }

        /* Item 6 — gradient divider */
        .gradient-divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(226,232,240,0.8), transparent);
            border: none;
            margin: 1.5rem 0;
        }

        /* Dense mode spacing overrides */
        .density-dense .ui-card { padding: 0.75rem; gap: 0.5rem; }
        .density-dense .ui-panel { padding: 1rem; }
        .density-dense .ui-section { gap: 1.5rem; margin-bottom: 1rem; }
        .density-dense .prospect-card { padding: 0.75rem; gap: 0.5rem; }
    </style>
</head>
<body>
    <div id="root">
        <div id="boot-loader" style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;color:#64748b;font-family:Inter,sans-serif;">
            <div style="font-family:Orbitron,sans-serif;font-size:1.25rem;font-weight:900;background:linear-gradient(135deg,#14b8a6 0%,#3b82f6 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">BTR INTELLIGENCE</div>
            <div id="boot-status" style="font-size:0.85rem;">Loading application…</div>
        </div>
    </div>
    <script>
        (function(){
            var s = document.getElementById('boot-status');
            window.addEventListener('error', function(e){
                if (s) { s.style.color = '#ef4444'; s.textContent = 'Load error: ' + (e.message || 'unknown') + ' — try a hard refresh (Ctrl+Shift+R)'; }
            });
            setTimeout(function(){
                if (document.getElementById('boot-loader') && s) {
                    s.textContent = 'Still loading… (compiling app, this can take 10–20s on first load)';
                }
            }, 8000);
        })();
    </script>

    <script src="/static/vendor/app.js"></script>
</body>
</html>
