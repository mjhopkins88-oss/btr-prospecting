<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SignalStack</title>
<style>
  :root {
    --bg: #0b0d10; --panel: #14181d; --line: #232a32;
    --fg: #e6ecf2; --muted: #8a96a3; --accent: #6ee7b7; --warn: #fbbf24;
    --bad: #f87171;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.5 -apple-system, system-ui, sans-serif; }
  a { color: var(--accent); text-decoration: none; cursor: pointer; }
  header { display: flex; align-items: center; gap: 18px;
    padding: 14px 22px; border-bottom: 1px solid var(--line); }
  header h1 { margin: 0; font-size: 16px; letter-spacing: 0.04em; }
  header nav a { color: var(--muted); margin-right: 14px; font-size: 13px; }
  header nav a.active { color: var(--fg); }
  main { padding: 22px; max-width: 1100px; margin: 0 auto; }
  h2 { font-size: 18px; margin: 0 0 14px; }
  .card { background: var(--panel); border: 1px solid var(--line);
    border-radius: 8px; padding: 16px; margin-bottom: 14px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .row > * { flex: 1; min-width: 200px; }
  input, select, textarea, button {
    background: #0f1318; color: var(--fg); border: 1px solid var(--line);
    border-radius: 6px; padding: 8px 10px; font: inherit; width: 100%;
  }
  textarea { min-height: 70px; resize: vertical; }
  button { background: var(--accent); color: #0b0d10; border: none;
    font-weight: 600; cursor: pointer; width: auto; padding: 8px 14px; }
  button.ghost { background: transparent; color: var(--fg);
    border: 1px solid var(--line); }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 500; font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.04em; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px;
    background: #1c2530; color: var(--muted); font-size: 11px; }
  .pill.warn { color: var(--warn); }
  .pill.good { color: var(--accent); }
  .pill.bad { color: var(--bad); }
  .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); }
  .stat { background: var(--panel); border: 1px solid var(--line);
    border-radius: 8px; padding: 14px; }
  .stat .n { font-size: 24px; font-weight: 600; }
  .stat .l { color: var(--muted); font-size: 12px; text-transform: uppercase; }
  .muted { color: var(--muted); }
  .candidate { border-left: 3px solid var(--accent); padding-left: 12px;
    margin-bottom: 14px; }
  .rejected .candidate { border-left-color: var(--bad); }
  pre { white-space: pre-wrap; word-break: break-word; }
  label { display: block; font-size: 12px; color: var(--muted);
    margin-bottom: 4px; }
  .mb { margin-bottom: 10px; }
</style>
</head>
<body>
<header>
  <h1>SignalStack</h1>
  <nav id="nav">
    <a data-route="/dashboard">Dashboard</a>
    <a data-route="/prospects">Prospects</a>
    <a data-route="/companies">Companies</a>
    <a data-route="/generator">Generator</a>
    <a data-route="/messages">Messages</a>
    <a data-route="/knowledge">Knowledge</a>
    <a data-route="/settings">Settings</a>
  </nav>
</header>
<main id="view">Loading…</main>

<script>
const API = "/api/signalstack";
const $ = (s, el=document) => el.querySelector(s);
const h = (tag, props={}, ...kids) => {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(props||{})) {
    if (k === "class") el.className = v;
    else if (k === "html") el.innerHTML = v;
    else if (k.startsWith("on")) el.addEventListener(k.slice(2), v);
    else if (v !== undefined && v !== null) el.setAttribute(k, v);
  }
  for (const k of kids.flat()) {
    if (k == null) continue;
    el.append(k.nodeType ? k : document.createTextNode(k));
  }
  return el;
};
async function api(path, opts={}) {
  const r = await fetch(API + path, {
    headers: {"Content-Type": "application/json"},
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!r.ok) {
    let msg = r.statusText || ("HTTP " + r.status);
    try {
      const j = await r.json();
      msg = j.error || j.message || msg;
    } catch (_) {
      try { msg = (await r.text()).slice(0, 300) || msg; } catch (_) {}
    }
    throw new Error(msg);
  }
  return r.json();
}

let META = null;
async function loadMeta() { if (!META) META = await api("/meta"); return META; }

// ----------------- Router -----------------
const routes = {
  "/dashboard": viewDashboard,
  "/prospects": viewProspects,
  "/prospects/:id": viewProspect,
  "/companies": viewCompanies,
  "/companies/:id": viewCompany,
  "/generator": viewGenerator,
  "/messages": viewMessages,
  "/knowledge": viewKnowledgeList,
  "/knowledge/new": viewKnowledgeNew,
  "/knowledge/:id": viewKnowledgeDetail,
  "/settings": viewSettings,
};

function parseHash() {
  const raw = (location.hash || "#/dashboard").slice(1);
  for (const pat of Object.keys(routes)) {
    const pp = pat.split("/"), rp = raw.split("/");
    if (pp.length !== rp.length) continue;
    const params = {};
    let ok = true;
    for (let i=0;i<pp.length;i++) {
      if (pp[i].startsWith(":")) params[pp[i].slice(1)] = decodeURIComponent(rp[i]);
      else if (pp[i] !== rp[i]) { ok = false; break; }
    }
    if (ok) return { fn: routes[pat], params };
  }
  return { fn: viewDashboard, params: {} };
}

async function render() {
  await loadMeta();
  const { fn, params } = parseHash();
  $("#view").innerHTML = "";
  document.querySelectorAll("#nav a").forEach(a =>
    a.classList.toggle("active", location.hash.startsWith("#"+a.dataset.route)));
  try { await fn(params); }
  catch (e) { $("#view").append(h("div", {class:"card"}, "Error: " + e.message)); }
}
window.addEventListener("hashchange", render);
document.querySelectorAll("#nav a").forEach(a => {
  a.href = "#" + a.dataset.route;
});

// ----------------- Views -----------------
async function viewDashboard() {
  const v = $("#view");
  v.append(h("h2", {}, "Dashboard"));
  const a = await api("/analytics");
  const stats = h("div", {class:"grid"});
  const stat = (l,n) => stats.append(h("div",{class:"stat"},
    h("div",{class:"n"}, String(n)), h("div",{class:"l"}, l)));
  stat("Messages sent", a.messages_sent);
  stat("Reply rate", (a.reply_rate*100).toFixed(0) + "%");
  stat("Positive reply rate", (a.positive_reply_rate*100).toFixed(0) + "%");
  stat("Meeting rate", (a.meeting_rate*100).toFixed(0) + "%");
  v.append(stats);

  const byStatus = h("div", {class:"card"});
  byStatus.append(h("h2",{},"Prospects by status"));
  const tbl = h("table");
  tbl.append(h("tr",{},h("th",{},"Status"),h("th",{},"Count")));
  for (const [k,n] of Object.entries(a.prospects_by_status||{}))
    tbl.append(h("tr",{},h("td",{},k),h("td",{},String(n))));
  byStatus.append(tbl);
  v.append(byStatus);

  const cards = h("div",{class:"row"});
  cards.append(makeRanker("Top message types", a.top_message_types, "message_type"));
  cards.append(makeRanker("Top signal types", a.top_signal_types, "signal_type"));
  v.append(cards);
}
function makeRanker(title, rows, key) {
  const c = h("div",{class:"card"});
  c.append(h("h2",{},title));
  const t = h("table");
  t.append(h("tr",{},h("th",{},"Type"),h("th",{},"Used"),h("th",{},"Positive"),h("th",{},"Rate")));
  (rows||[]).forEach(r => t.append(h("tr",{},
    h("td",{}, r[key]),
    h("td",{}, String(r.sent || r.used || 0)),
    h("td",{}, String(r.positive || 0)),
    h("td",{}, ((r.rate||0)*100).toFixed(0)+"%"))));
  c.append(t);
  return c;
}

async function viewProspects() {
  const v = $("#view");
  v.append(h("h2",{},"Prospects"));

  // Create form
  const form = h("div",{class:"card"});
  form.append(h("h2",{},"Add prospect"));
  const fields = ["full_name","linkedin_url","company_name","title","industry","location"];
  const inputs = {};
  const row = h("div",{class:"row"});
  fields.forEach(f => {
    const w = h("div");
    w.append(h("label",{},f.replace(/_/g," ")));
    const i = h("input",{placeholder:f});
    inputs[f] = i; w.append(i); row.append(w);
  });
  form.append(row);
  const btn = h("button",{},"Add");
  btn.onclick = async () => {
    const data = {}; for (const [k,i] of Object.entries(inputs)) if (i.value) data[k]=i.value;
    if (!data.full_name) return alert("full_name required");
    await api("/prospects",{method:"POST",body:data});
    render();
  };
  form.append(btn);
  v.append(form);

  // List
  const q = h("input",{placeholder:"search…"});
  q.oninput = () => loadList();
  const listCard = h("div",{class:"card"});
  listCard.append(q);
  const tbl = h("table");
  listCard.append(tbl);
  v.append(listCard);
  async function loadList() {
    const items = await api("/prospects?q=" + encodeURIComponent(q.value));
    tbl.innerHTML = "";
    tbl.append(h("tr",{},h("th",{},"Name"),h("th",{},"Company"),h("th",{},"Title"),h("th",{},"Status")));
    items.forEach(p => {
      const tr = h("tr");
      tr.append(h("td",{},h("a",{href:"#/prospects/"+p.id},p.full_name)));
      tr.append(h("td",{},p.company_name||""));
      tr.append(h("td",{},p.title||""));
      tr.append(h("td",{},h("span",{class:"pill"},p.status)));
      tbl.append(tr);
    });
  }
  loadList();
}

async function viewProspect({id}) {
  const v = $("#view");
  const p = await api("/prospects/"+id);
  v.append(h("h2",{},p.full_name));
  v.append(h("div",{class:"muted mb"},
    [p.title, p.company_name, p.location].filter(Boolean).join(" • ")));

  // Status / warmth
  const meta = h("div",{class:"card"});
  const statusSel = h("select");
  META.prospect_status.forEach(s => {
    const o = h("option",{value:s},s); if (p.status===s) o.selected = true;
    statusSel.append(o);
  });
  statusSel.onchange = () => api("/prospects/"+id, {method:"PATCH", body:{status: statusSel.value}});
  meta.append(h("label",{},"Status"), statusSel);
  v.append(meta);

  // Signals
  const sigCard = h("div",{class:"card"});
  sigCard.append(h("h2",{},"Signals"));
  (p.signals||[]).forEach(s => {
    sigCard.append(h("div",{class:"mb"},
      h("span",{class:"pill " + (s.safe_to_reference ? "good":"warn")}, s.type),
      " ", s.text));
  });
  // Add signal
  const sigType = h("select"); META.signal_types.forEach(t => sigType.append(h("option",{value:t},t)));
  const sigSrc = h("select"); META.signal_sources.forEach(t => sigSrc.append(h("option",{value:t},t)));
  const sigTxt = h("textarea",{placeholder:"Observed fact (only what you actually saw)…"});
  const sigSafe = h("input",{type:"checkbox"}); sigSafe.checked = true;
  const safeWrap = h("label",{},sigSafe," safe to reference in outreach");
  const addSig = h("button",{},"Add signal");
  addSig.onclick = async () => {
    if (!sigTxt.value) return;
    await api("/signals",{method:"POST", body:{
      prospect_id: id, type: sigType.value, source: sigSrc.value,
      text: sigTxt.value, safe_to_reference: sigSafe.checked,
    }});
    render();
  };
  sigCard.append(h("div",{class:"row"}, sigType, sigSrc), sigTxt, safeWrap, addSig);
  v.append(sigCard);

  // Generator shortcut
  const gen = h("button",{},"Generate messages");
  gen.onclick = () => location.hash = "#/generator?prospect=" + id;
  v.append(gen);

  // Messages
  const mCard = h("div",{class:"card"});
  mCard.append(h("h2",{},"Messages"));
  (p.messages||[]).forEach(m => {
    mCard.append(h("div",{class:"candidate mb"},
      h("div",{class:"muted"}, m.status + " • " + (m.message_type||"")),
      h("pre",{},m.body)));
  });
  v.append(mCard);
}

async function viewCompanies() {
  const v = $("#view");
  v.append(h("h2",{},"Companies"));
  const form = h("div",{class:"card"});
  const name = h("input",{placeholder:"name"});
  const ind = h("input",{placeholder:"industry"});
  const loc = h("input",{placeholder:"location"});
  const btn = h("button",{},"Add");
  btn.onclick = async () => {
    if (!name.value) return;
    await api("/companies",{method:"POST",body:{name:name.value, industry:ind.value, location:loc.value}});
    render();
  };
  form.append(h("div",{class:"row"},name,ind,loc), btn);
  v.append(form);
  const items = await api("/companies");
  const tbl = h("table");
  tbl.append(h("tr",{},h("th",{},"Name"),h("th",{},"Industry"),h("th",{},"Location")));
  items.forEach(c => tbl.append(h("tr",{},
    h("td",{},h("a",{href:"#/companies/"+c.id},c.name)),
    h("td",{},c.industry||""),
    h("td",{},c.location||""))));
  v.append(h("div",{class:"card"},tbl));
}

async function viewCompany({id}) {
  const v = $("#view");
  const c = await api("/companies/"+id);
  v.append(h("h2",{},c.name));
  v.append(h("div",{class:"muted mb"},[c.industry,c.location].filter(Boolean).join(" • ")));
  v.append(h("div",{class:"card"}, h("h2",{},"Notes"), h("pre",{},c.notes||"—")));
  const sc = h("div",{class:"card"});
  sc.append(h("h2",{},"Signals"));
  (c.signals||[]).forEach(s => sc.append(h("div",{},
    h("span",{class:"pill"},s.type)," ",s.text)));
  v.append(sc);
  const pc = h("div",{class:"card"});
  pc.append(h("h2",{},"Prospects at this company"));
  (c.prospects||[]).forEach(p => pc.append(h("div",{},
    h("a",{href:"#/prospects/"+p.id},p.full_name),
    " — ", h("span",{class:"muted"},p.title||""))));
  v.append(pc);
}

async function viewGenerator() {
  const v = $("#view");
  v.append(h("h2",{},"Generator"));
  const params = new URLSearchParams((location.hash.split("?")[1])||"");
  const prospects = await api("/prospects");
  const sel = h("select");
  sel.append(h("option",{value:""},"— select prospect —"));
  prospects.forEach(p => {
    const o = h("option",{value:p.id}, p.full_name + (p.company_name? " ("+p.company_name+")":""));
    if (params.get("prospect") === p.id) o.selected = true;
    sel.append(o);
  });
  const card = h("div",{class:"card"});
  card.append(h("label",{},"Prospect"), sel);

  // LinkedIn profile context inputs (manual / lawful workflow).
  const linkedinUrl = h("input",{placeholder:"LinkedIn profile URL"});
  const headline = h("input",{placeholder:"Headline (optional)"});
  const featuredTopics = h("input",{placeholder:"Featured topics (optional)"});
  const aboutText = h("textarea",{placeholder:"Paste profile / about text (optional)"});
  const instruction = h("textarea",{placeholder:"Custom instruction — e.g. 'keep it short, focus on credibility'"});

  // Strategy override
  const mtype = h("select"); mtype.append(h("option",{value:""},"— message type —"));
  META.message_types.forEach(t => mtype.append(h("option",{value:t},t)));
  const trigger = h("select"); trigger.append(h("option",{value:""},"— primary trigger —"));
  META.primary_triggers.forEach(t => trigger.append(h("option",{value:t},t)));
  const style = h("select"); style.append(h("option",{value:""},"— style —"));
  META.communication_styles.forEach(t => style.append(h("option",{value:t},t)));
  const goal = h("select"); goal.append(h("option",{value:""},"— goal —"));
  META.outreach_goals.forEach(t => goal.append(h("option",{value:t},t)));

  card.append(h("label",{},"LinkedIn URL"), linkedinUrl);
  card.append(h("div",{class:"row"},
    h("div",{},h("label",{},"Headline"), headline),
    h("div",{},h("label",{},"Featured topics"), featuredTopics)));
  card.append(h("label",{},"Pasted profile / about text"), aboutText);
  card.append(h("label",{},"Custom instruction"), instruction);
  card.append(h("label",{},"Strategy override"));
  card.append(h("div",{class:"row"}, mtype, trigger, style, goal));

  const btn = h("button",{},"Generate");
  card.append(btn);
  v.append(card);

  const out = h("div");
  v.append(out);

  btn.onclick = async () => {
    if (!sel.value) { out.innerHTML = ""; out.append(h("div",{class:"card"},"Pick a prospect first.")); return; }
    out.innerHTML = "Generating…";
    btn.disabled = true;
    try {
      const profile = {
        linkedin_url: linkedinUrl.value || undefined,
        headline: headline.value || undefined,
        featured_topics: featuredTopics.value || undefined,
        about_text: aboutText.value || undefined,
      };
      const strategy = {
        message_type: mtype.value || undefined,
        primary_trigger: trigger.value || undefined,
        communication_style: style.value || undefined,
        outreach_goal: goal.value || undefined,
      };
      const r = await api("/generate",{method:"POST", body:{
        prospect_id: sel.value, n: 4,
        instruction: instruction.value || undefined,
        profile, strategy,
      }});
      out.innerHTML = "";
      if (r.error) {
        out.append(h("div",{class:"card"}, r.message || r.error));
        return;
      }
      const okCard = h("div",{class:"card"});
      okCard.append(h("h2",{},"Candidates"));
      if (r.playbook && r.playbook.name) {
        const pbCard = h("div",{class:"card"});
        pbCard.append(h("h2",{},"Industry playbook: "+r.playbook.name));
        if (r.playbook.description) pbCard.append(h("div",{class:"muted"},r.playbook.description));
        if ((r.playbook.categories||[]).length) {
          pbCard.append(h("div",{class:"muted"},"Categories loaded: "+r.playbook.categories.join(", ")));
        }
        if ((r.playbook.preferred_angles||[]).length) {
          pbCard.append(h("div",{class:"muted"},"Preferred angles: "+r.playbook.preferred_angles.slice(0,5).join(", ")));
        }
        (r.playbook.entries||[]).forEach(e => {
          pbCard.append(h("div",{class:"mb"},
            h("div",{},"["+e.category+"] "+e.title+" ("+(e.confidence||"")+")"),
            e.description ? h("div",{class:"muted"},e.description) : null,
          ));
        });
        if (r.playbook.reasoning) pbCard.append(h("div",{class:"muted"},r.playbook.reasoning));
        out.append(pbCard);
      }
      if (!(r.candidates||[]).length && !(r.rejected||[]).length) {
        okCard.append(h("div",{class:"muted"},
          "No candidates were generated. Add a signal, note, headline, featured topics, or paste profile/about text so the generator has something concrete to anchor on."));
      }
      (r.candidates||[]).forEach(c => {
      const wrap = h("div",{class:"candidate mb"});
      wrap.append(h("pre",{},c.body));
      const ac = c.anti_copy || {};
      wrap.append(h("div",{class:"muted"},
        c.message_type+" • "+c.primary_trigger
        +" • grounding "+c.grounding.score
        +" • "+(ac.char_count||c.body.length)+" chars"
        +" • overlap "+(ac.raw_source_overlap_score ?? 0)
        +(ac.passes_anti_copy_check===false ? " • COPY-FAIL" : "")));
      if (c.observation && c.observation.safe_reference_text) {
        wrap.append(h("div",{class:"muted"},
          "Observation: "+c.observation.safe_reference_text));
      }
      wrap.append(h("div",{class:"muted"},"Rationale: "+c.rationale));
      if (c.selected_angle) {
        wrap.append(h("div",{class:"muted"},"Selected angle: "+c.selected_angle));
      }
      if ((c.playbook_entries_used||[]).length) {
        wrap.append(h("div",{class:"muted"},
          "Playbook entries used: " +
          c.playbook_entries_used.map(e => "["+e.category+"] "+e.title).join(" • ")));
      }
      if ((c.knowledge_entries_used||[]).length) {
        const used = c.knowledge_entries_used;
        const sample = used.slice(0,4).map(e => "["+e.category+"] "+e.principle_name).join(" • ");
        const more = used.length > 4 ? " (+"+(used.length-4)+" more)" : "";
        wrap.append(h("div",{class:"muted"},
          "Knowledge dataset: " + sample + more +
          "  · " + (c.knowledge_source_ids_used||[]).length + " sources"));
      }
      if (c.playbook_reasoning) {
        wrap.append(h("div",{class:"muted"},"Why: "+c.playbook_reasoning));
      }
      if ((c.signal_ids||[]).length) {
        wrap.append(h("div",{class:"muted"},"Signals: "+c.signal_ids.join(", ")));
      }
      if ((c.facts_used||[]).length) {
        wrap.append(h("div",{class:"muted"},"Facts: "+c.facts_used.join(", ")));
      }
      const save = h("button",{},"Save draft");
      save.onclick = async () => {
        await api("/messages",{method:"POST",body:{...c, prospect_id: sel.value}});
        save.textContent = "Saved";
      };
      wrap.append(save);
      okCard.append(wrap);
    });
      out.append(okCard);
      if (r.rejected?.length) {
        const rc = h("div",{class:"card rejected"});
        rc.append(h("h2",{},"Rejected by grounding"));
        r.rejected.forEach(c => rc.append(h("div",{class:"candidate mb"},
          h("pre",{},c.body),
          h("div",{class:"muted"},"Violations: "+ ((c.grounding&&c.grounding.violations||[]).join(", "))))));
        out.append(rc);
      }
    } catch (err) {
      out.innerHTML = "";
      out.append(h("div",{class:"card"}, "Generation failed: " + (err && err.message || err)));
    } finally {
      btn.disabled = false;
    }
  };
}

async function viewMessages() {
  const v = $("#view");
  v.append(h("h2",{},"Messages"));
  const items = await api("/messages");
  const tbl = h("table");
  tbl.append(h("tr",{},h("th",{},"Created"),h("th",{},"Type"),h("th",{},"Status"),h("th",{},"Body"),h("th",{},"Outcome")));
  items.forEach(m => {
    const tr = h("tr");
    tr.append(h("td",{},(m.created_at||"").slice(0,10)));
    tr.append(h("td",{},m.message_type||""));
    tr.append(h("td",{},m.status));
    tr.append(h("td",{},m.body.slice(0,80)));
    const sel = h("select");
    sel.append(h("option",{value:""},"—"));
    META.message_outcomes.forEach(o => sel.append(h("option",{value:o},o)));
    sel.onchange = () => sel.value && api("/messages/"+m.id+"/outcome",{method:"POST",body:{outcome:sel.value}});
    tr.append(h("td",{},sel));
    tbl.append(tr);
  });
  v.append(h("div",{class:"card"},tbl));
}

// ----------------- Knowledge Dataset -----------------

function _ksTypeLabel(t) {
  return ({
    youtube_video: "YouTube",
    article: "Article",
    note: "Note",
    playbook: "Playbook",
    transcript: "Transcript",
    framework: "Framework",
    manual_entry: "Manual",
    podcast: "Podcast",
    other: "Other",
  })[t] || t;
}

async function viewKnowledgeList() {
  const v = $("#view");
  v.append(h("h2",{},"Knowledge dataset"));
  v.append(h("div",{class:"muted mb"},
    "Reusable strategy/style/angle knowledge. Videos, articles, " +
    "notes, podcasts, frameworks, playbooks. Used by the generator " +
    "for tone and framing — never as prospect personalization."));

  // Stats row
  const statsWrap = h("div",{class:"grid"});
  v.append(statsWrap);
  try {
    const s = await api("/knowledge/stats");
    const stat = (l,n) => statsWrap.append(h("div",{class:"stat"},
      h("div",{class:"n"}, String(n)), h("div",{class:"l"}, l)));
    stat("Total sources", s.total_sources);
    stat("Active sources", s.active_sources);
    stat("Extracted entries", s.total_entries);
    stat("Videos", s.videos);
    stat("Articles", s.articles);
    stat("Notes", (s.notes||0) + (s.manual_entries||0));
    stat("Podcasts", s.podcasts);
    stat("Playbooks", s.playbooks);
  } catch (e) {
    statsWrap.append(h("div",{class:"card"},"Stats unavailable: "+e.message));
  }

  // Toolbar: add + filters
  const tools = h("div",{class:"card"});
  const top = h("div",{class:"row"});
  const addBtn = h("button",{}, "Add source");
  addBtn.onclick = () => location.hash = "#/knowledge/new";
  const search = h("input",{placeholder:"search title / summary / notes…"});

  const typeSel = h("select");
  typeSel.append(h("option",{value:""},"All types"));
  (META.knowledge_source_types||[]).forEach(t =>
    typeSel.append(h("option",{value:t}, _ksTypeLabel(t))));

  const activeSel = h("select");
  ["all","active","inactive"].forEach(s => activeSel.append(h("option",{value:s}, s)));

  const statusSel = h("select");
  statusSel.append(h("option",{value:""},"Any status"));
  (META.knowledge_extraction_status||[]).forEach(s =>
    statusSel.append(h("option",{value:s}, s)));

  const tagInput = h("input",{placeholder:"tag…"});

  top.append(
    h("div",{}, h("label",{},"Add"), addBtn),
    h("div",{}, h("label",{},"Search"), search),
    h("div",{}, h("label",{},"Type"), typeSel),
    h("div",{}, h("label",{},"Active"), activeSel),
    h("div",{}, h("label",{},"Status"), statusSel),
    h("div",{}, h("label",{},"Tag"), tagInput),
  );
  tools.append(top);
  v.append(tools);

  // Source table
  const listCard = h("div",{class:"card"});
  v.append(listCard);

  async function reload() {
    const params = new URLSearchParams();
    if (search.value) params.set("q", search.value);
    if (typeSel.value) params.set("source_type", typeSel.value);
    if (activeSel.value && activeSel.value !== "all") params.set("active", activeSel.value === "active" ? "true" : "false");
    if (statusSel.value) params.set("extraction_status", statusSel.value);
    if (tagInput.value) params.set("tag", tagInput.value);
    let items = [];
    try { items = await api("/knowledge/sources?" + params.toString()); }
    catch (e) { listCard.innerHTML = ""; listCard.append("Error: "+e.message); return; }
    listCard.innerHTML = "";
    if (!items.length) {
      listCard.append(h("div",{class:"muted"},"No knowledge sources match these filters yet."));
      return;
    }
    const tbl = h("table");
    tbl.append(h("tr",{},
      h("th",{},"Title"),
      h("th",{},"Type"),
      h("th",{},"Status"),
      h("th",{},"Active"),
      h("th",{},"Entries"),
      h("th",{},"Tags"),
      h("th",{},"Created"),
      h("th",{},"Actions"),
    ));
    items.forEach(s => {
      const tr = h("tr");
      const titleCell = h("td",{},
        h("a",{href:"#/knowledge/"+s.id}, s.title||"(untitled)"),
        s.source_url ? h("div",{class:"muted",style:"font-size:11px"}, s.source_url) : null,
      );
      tr.append(titleCell);
      tr.append(h("td",{}, h("span",{class:"pill"}, _ksTypeLabel(s.source_type))));
      tr.append(h("td",{}, h("span",{class:"pill " + (s.extraction_status==="EXTRACTED"?"good":(s.extraction_status==="ARCHIVED"?"bad":"warn"))}, s.extraction_status||"RAW")));
      tr.append(h("td",{}, h("span",{class:"pill " + (s.active?"good":"bad")}, s.active?"yes":"no")));
      tr.append(h("td",{}, String(s.entry_count||0)));
      tr.append(h("td",{}, (s.tags||[]).map(t => h("span",{class:"pill"},t))));
      tr.append(h("td",{}, (s.created_at||"").slice(0,10)));
      const view = h("a",{href:"#/knowledge/"+s.id},"View");
      const ext = h("a",{},"Extract");
      ext.onclick = async (ev) => {
        ev.preventDefault();
        ext.textContent = "Extracting…";
        try { await api("/knowledge/sources/"+s.id+"/extract",{method:"POST"}); reload(); }
        catch (e) { ext.textContent = "Failed"; }
      };
      const arch = h("a",{},"Archive");
      arch.onclick = async (ev) => {
        ev.preventDefault();
        if (!confirm("Archive this source?")) return;
        try { await api("/knowledge/sources/"+s.id+"/archive",{method:"POST"}); reload(); }
        catch (e) { alert("Failed: "+e.message); }
      };
      tr.append(h("td",{}, view, " · ", ext, " · ", arch));
      tbl.append(tr);
    });
    listCard.append(tbl);
  }
  search.oninput = reload;
  typeSel.onchange = reload;
  activeSel.onchange = reload;
  statusSel.onchange = reload;
  tagInput.oninput = reload;
  reload();
}

async function viewKnowledgeNew() {
  const v = $("#view");
  v.append(h("h2",{},"Add knowledge source"));
  v.append(h("div",{class:"muted mb"},
    "Save a video, article, podcast, note, framework, or playbook. " +
    "Optionally extract structured knowledge entries from the source text."));

  const card = h("div",{class:"card"});
  const title = h("input",{placeholder:"Title"});
  const typeSel = h("select");
  (META.knowledge_source_types||[]).forEach(t =>
    typeSel.append(h("option",{value:t}, _ksTypeLabel(t))));
  typeSel.value = "manual_entry";
  const url = h("input",{placeholder:"Source URL (optional)"});
  const summary = h("textarea",{placeholder:"Summary (optional)"});
  const raw = h("textarea",{placeholder:"Pasted source text / transcript / article body"});
  const notes = h("textarea",{placeholder:"Notes (optional)"});
  const tags = h("input",{placeholder:"tags (comma separated)"});
  const active = h("input",{type:"checkbox"}); active.checked = true;
  const activeWrap = h("label",{}, active, " active and usable in generation");

  card.append(h("label",{},"Title"), title);
  card.append(h("div",{class:"row"},
    h("div",{}, h("label",{},"Source type"), typeSel),
    h("div",{}, h("label",{},"Source URL"), url),
  ));
  card.append(h("label",{},"Summary"), summary);
  card.append(h("label",{},"Source text / transcript"), raw);
  card.append(h("label",{},"Notes"), notes);
  card.append(h("label",{},"Tags"), tags);
  card.append(activeWrap);

  const saveBtn = h("button",{},"Save source");
  const saveExtractBtn = h("button",{},"Save and extract knowledge");
  saveExtractBtn.style.marginLeft = "8px";
  card.append(h("div",{class:"mb"}, saveBtn, saveExtractBtn));
  v.append(card);

  function payload() {
    return {
      title: title.value.trim(),
      source_type: typeSel.value,
      source_url: url.value.trim() || null,
      raw_text: raw.value || null,
      summary: summary.value || null,
      notes: notes.value || null,
      tags: tags.value || "",
      active: active.checked,
    };
  }

  saveBtn.onclick = async () => {
    const p = payload();
    if (!p.title) return alert("Title is required.");
    try {
      const created = await api("/knowledge/sources",{method:"POST", body: p});
      location.hash = "#/knowledge/"+created.id;
    } catch (e) { alert("Save failed: "+e.message); }
  };
  saveExtractBtn.onclick = async () => {
    const p = payload();
    if (!p.title) return alert("Title is required.");
    p.extract_after_save = true;
    saveExtractBtn.disabled = true;
    saveExtractBtn.textContent = "Saving + extracting…";
    try {
      const created = await api("/knowledge/sources",{method:"POST", body: p});
      location.hash = "#/knowledge/"+created.id;
    } catch (e) {
      saveExtractBtn.disabled = false;
      saveExtractBtn.textContent = "Save and extract knowledge";
      alert("Save failed: "+e.message);
    }
  };
}

async function viewKnowledgeDetail({id}) {
  const v = $("#view");
  let s;
  try { s = await api("/knowledge/sources/"+id); }
  catch (e) { v.append(h("div",{class:"card"},"Error: "+e.message)); return; }

  v.append(h("h2",{}, s.title || "(untitled)"));
  v.append(h("div",{class:"muted mb"},
    _ksTypeLabel(s.source_type)+" • "+s.extraction_status+" • created "+(s.created_at||"").slice(0,10)));

  // Source detail card
  const src = h("div",{class:"card"});
  src.append(h("h2",{},"Source"));
  if (s.source_url) src.append(h("div",{class:"mb"},
    h("span",{class:"muted"},"URL: "), h("a",{href:s.source_url, target:"_blank"}, s.source_url)));
  if (s.tags && s.tags.length) src.append(h("div",{class:"mb"},
    (s.tags||[]).map(t => h("span",{class:"pill"},t))));
  if (s.summary) {
    src.append(h("div",{class:"mb"}, h("label",{},"Summary"), h("pre",{}, s.summary)));
  }
  if (s.notes) {
    src.append(h("div",{class:"mb"}, h("label",{},"Notes"), h("pre",{}, s.notes)));
  }
  if (s.raw_text) {
    src.append(h("div",{class:"mb"}, h("label",{},"Raw text"), h("pre",{}, s.raw_text)));
  }

  // Toggle active
  const toggle = h("button",{class:"ghost"}, s.active ? "Deactivate" : "Activate");
  toggle.onclick = async () => {
    try {
      await api("/knowledge/sources/"+id, {method:"PATCH", body: {active: !s.active}});
      render();
    } catch (e) { alert("Failed: "+e.message); }
  };
  const extract = h("button",{}, "Re-run extraction");
  extract.onclick = async () => {
    extract.disabled = true; extract.textContent = "Extracting…";
    try { await api("/knowledge/sources/"+id+"/extract", {method:"POST"}); render(); }
    catch (e) { extract.disabled = false; extract.textContent = "Re-run extraction"; alert("Failed: "+e.message); }
  };
  const arch = h("button",{class:"ghost"}, "Archive");
  arch.onclick = async () => {
    if (!confirm("Archive this source?")) return;
    try { await api("/knowledge/sources/"+id+"/archive",{method:"POST"}); location.hash = "#/knowledge"; }
    catch (e) { alert("Failed: "+e.message); }
  };
  const back = h("a",{href:"#/knowledge", class:""},"← back to dataset");
  src.append(h("div",{class:"row"}, toggle, extract, arch));
  src.append(h("div",{class:"mb"}, back));
  v.append(src);

  // Entries
  const entries = s.entries || [];
  const ec = h("div",{class:"card"});
  ec.append(h("h2",{},"Extracted knowledge entries ("+entries.length+")"));
  if (!entries.length) {
    ec.append(h("div",{class:"muted"},"No entries yet. Click 'Re-run extraction' above to generate starter entries from the source text."));
  }
  entries.forEach(e => {
    const wrap = h("div",{class:"candidate mb"});
    wrap.append(h("div",{},
      h("span",{class:"pill"}, e.category),
      " ",
      h("strong",{}, e.principle_name),
      " ",
      h("span",{class:"pill " + (e.active?"good":"bad")}, e.active?"active":"inactive"),
      " ",
      h("span",{class:"muted"}, "conf "+(e.confidence||0).toFixed(2)),
    ));
    if (e.description) wrap.append(h("div",{class:"muted"}, e.description));
    if (e.practical_use_case) wrap.append(h("div",{class:"muted"}, "Use case: "+e.practical_use_case));
    if (e.example_pattern) wrap.append(h("div",{class:"muted"}, "Example: "+e.example_pattern));
    if (e.anti_pattern) wrap.append(h("div",{class:"muted"}, "Anti-pattern: "+e.anti_pattern));
    const toggleE = h("a",{}, e.active ? "Deactivate" : "Activate");
    toggleE.onclick = async (ev) => {
      ev.preventDefault();
      try { await api("/knowledge/entries/"+e.id, {method:"PATCH", body:{active: !e.active}}); render(); }
      catch (err) { alert("Failed: "+err.message); }
    };
    const delE = h("a",{}, "Delete");
    delE.onclick = async (ev) => {
      ev.preventDefault();
      if (!confirm("Delete this entry?")) return;
      try { await api("/knowledge/entries/"+e.id, {method:"DELETE"}); render(); }
      catch (err) { alert("Failed: "+err.message); }
    };
    wrap.append(h("div",{class:"mb"}, toggleE, " · ", delE));
    ec.append(wrap);
  });
  v.append(ec);
}
