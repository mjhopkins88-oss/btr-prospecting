<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multifamily Insurance Benchmark Review</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0b1220;
        --card: rgba(15,22,36,0.95);
        --border: rgba(255,255,255,0.1);
        --accent: #f59e0b;
        --text: #f1f5f9;
        --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        padding: 2.5rem 1rem;
    }
    .wrap { max-width: 640px; margin: 0 auto; }
    h1 {
        font-family: 'Orbitron', sans-serif;
        font-size: 1.4rem;
        font-weight: 900;
        background: linear-gradient(135deg, var(--accent) 0%, #fbbf24 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0 0 0.5rem;
    }
    p.lede { color: var(--muted); font-size: 0.9rem; margin: 0 0 1.75rem; line-height: 1.5; }
    form { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    label { font-size: 0.78rem; color: var(--muted); display: block; }
    label.full { grid-column: 1 / -1; }
    input, select, textarea {
        width: 100%;
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.6rem 0.7rem;
        color: var(--text);
        font-size: 0.9rem;
        font-family: 'Inter', sans-serif;
        margin-top: 5px;
    }
    textarea { resize: vertical; }
    .hint { font-size: 0.7rem; color: #64748b; margin-top: 4px; }
    .actions { margin-top: 1.5rem; display: flex; justify-content: flex-end; }
    button {
        background: var(--accent);
        border: none;
        color: #0f172a;
        padding: 0.7rem 1.4rem;
        border-radius: 0.5rem;
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .result {
        margin-top: 1rem;
        padding: 0.9rem 1.1rem;
        border-radius: 8px;
        font-size: 0.85rem;
        display: none;
    }
    .result.ok { display: block; background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: #34d399; }
    .result.err { display: block; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
    .conditional { display: none; }
</style>
</head>
<body>
<div class="wrap">
    <h1>MULTIFAMILY INSURANCE BENCHMARK REVIEW</h1>
    <p class="lede">
        Tell us a bit about your property and we'll compare your current program against where multifamily
        insurance pricing has moved this year — no obligation, no hard sell. California and Texas only for now.
    </p>
    <form id="benchmark-form">
        <div class="grid">
            <label>Name *
                <input name="name" required>
            </label>
            <label>Company *
                <input name="company" required>
            </label>
            <label>Email *
                <input name="email" type="email" required>
            </label>
            <label>Phone
                <input name="phone">
            </label>
            <label>Role / Title
                <input name="role" placeholder="e.g. VP of Risk Management">
            </label>
            <label>State *
                <select name="state" required>
                    <option value="">Select...</option>
                    <option value="TX">Texas</option>
                    <option value="CA">California</option>
                </select>
            </label>
            <label>City
                <input name="city">
            </label>
            <label>Asset Type
                <select name="assetType">
                    <option value="">Select...</option>
                    <option value="garden">Garden-style</option>
                    <option value="mid_rise">Mid-rise</option>
                    <option value="high_rise">High-rise</option>
                    <option value="mixed_use">Mixed-use</option>
                </select>
            </label>
            <label># of Units
                <input name="numberOfUnits" type="number" min="0">
            </label>
            <label>What best describes your situation? *
                <select name="leadSituation" id="leadSituation" required>
                    <option value="benchmark">Just want a general benchmark/review</option>
                    <option value="renewal">Renewal coming up</option>
                    <option value="acquisition">Acquisition</option>
                    <option value="refinance">Refinance</option>
                    <option value="construction">Construction project</option>
                    <option value="operating">Just operating — no specific trigger</option>
                </select>
            </label>
            <label class="conditional" id="renewalDateField">Renewal Date
                <input name="renewalDate" type="date">
            </label>
            <label class="conditional" id="projectStartDateField">Project Start Date
                <input name="projectStartDate" type="date">
            </label>
            <label>Primary Concern
                <select name="primaryConcern">
                    <option value="">Select...</option>
                    <option value="premium_increase">Premium increase</option>
                    <option value="deductible_concern">Deductible concern</option>
                    <option value="lender_requirement">Lender requirement</option>
                    <option value="cat_exposed_geography">CAT-exposed geography</option>
                    <option value="builders_risk_need">Builder's risk need</option>
                    <option value="gl_excess_concern">GL / excess concern</option>
                </select>
            </label>
            <label class="full">Anything else we should know?
                <textarea name="notes" rows="3"></textarea>
            </label>
        </div>
        <div class="result" id="result"></div>
        <div class="actions">
            <button type="submit" id="submit-btn">Request My Benchmark Review</button>
        </div>
    </form>
</div>
<script>
(function () {
    var form = document.getElementById('benchmark-form');
    var resultEl = document.getElementById('result');
    var submitBtn = document.getElementById('submit-btn');
    var situationSelect = document.getElementById('leadSituation');
    var renewalField = document.getElementById('renewalDateField');
    var constructionField = document.getElementById('projectStartDateField');

    function updateConditionalFields() {
        renewalField.style.display = situationSelect.value === 'renewal' ? 'block' : 'none';
        constructionField.style.display = situationSelect.value === 'construction' ? 'block' : 'none';
    }
    situationSelect.addEventListener('change', updateConditionalFields);
    updateConditionalFields();

    form.addEventListener('submit', function (e) {
        e.preventDefault();
        resultEl.className = 'result';
        resultEl.textContent = '';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting…';

        var data = Object.fromEntries(new FormData(form).entries());
        data.source = 'benchmark_form';
        data.sourcePage = 'Multifamily Insurance Benchmark Review';
        data.sourceUrl = window.location.href;

        fetch('/api/multifamily/leads', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
        })
            .then(function (res) { return res.json().then(function (json) { return { ok: res.ok, json: json }; }); })
            .then(function (r) {
                if (r.ok && r.json.success) {
                    resultEl.className = 'result ok';
                    resultEl.textContent = "Thanks — we've got your request and will follow up shortly.";
                    form.reset();
                    updateConditionalFields();
                } else {
                    resultEl.className = 'result err';
                    resultEl.textContent = (r.json.errors || ['Something went wrong. Please try again.']).join(' ');
                }
            })
            .catch(function (err) {
                resultEl.className = 'result err';
                resultEl.textContent = 'Network error: ' + err.message;
            })
            .finally(function () {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Request My Benchmark Review';
            });
    });
})();
</script>
</body>
</html>
